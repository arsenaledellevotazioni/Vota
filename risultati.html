<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risultati Live - Arsenale delle Apparizioni</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* FONT TEATRALE E MODERNO */
        @import url('https://fonts.googleapis.com/css2?family=Anton&family=Roboto:wght@400;700&display=swap');

        body {
            font-family: 'Roboto', sans-serif;
            text-align: center;
            background: #111;
            color: #eee;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #container {
            width: 95%;
            max-width: 900px; /* Aumentato per ospitare le barre più grandi */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
        }

        /* HEADER CON LOGO */
        #header-logo {
            width: 140px; /* Leggermente più grande per bilanciare il testo */
            margin-bottom: 20px;
        }

        #title {
            font-family: 'Anton', sans-serif;
            font-size: 64px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
            margin-top: 10px;
            margin-bottom: 10px;
            
            /* Costringe il testo su un'unica riga */
            white-space: nowrap; 
        }

        #subtitle {
            font-family: 'Anton', sans-serif;
            font-size: 38px;
            color: #888; /* Un grigio leggero per dare contrasto al titolo */
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 2px rgba(255, 255, 255, 0.2);
            margin-top: 0;
            margin-bottom: 60px;
        }

        /* CONTENITORE RISULTATI CON BARRE MAGGIORATE */
        #results-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 40px; /* Più spazio tra le due barre */
            margin-bottom: 60px;
        }

        .result-bar-group {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.04);
            padding: 25px 30px; /* Più respiro interno */
            border-radius: 16px;
            box-shadow: 0 6px 25px rgba(0,0,0,0.4);
            box-sizing: border-box;
        }

        /* NOMI DELLE BARRE INGRANDITI */
        .label {
            font-family: 'Anton', sans-serif;
            font-size: 32px; /* Aumentato da 20px */
            text-transform: uppercase;
            letter-spacing: 1px;
            flex: 0 0 220px; /* Allargata la base per i testi più grandi */
            text-align: left;
        }

        /* ALTEZZA DELLA BARRA AUMENTATA */
        .bar-wrapper {
            flex: 1;
            height: 50px; /* Aumentato da 30px per dare più impatto visivo */
            background: rgba(255, 255, 255, 0.08);
            border-radius: 25px;
            overflow: hidden;
            margin: 0 25px;
            position: relative;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }

        .bar {
            height: 100%;
            width: 0%;
            transition: width 0.6s cubic-bezier(0.25, 1, 0.5, 1); /* Transizione ancora più fluida ed elegante */
            border-radius: 25px;
        }

        .label-a { color: #007bff; text-shadow: 0 0 10px rgba(0, 123, 255, 0.3); }
        .bar-a {
            background: linear-gradient(90deg, #007bff, #00d4ff);
            box-shadow: 0 0 15px rgba(0, 123, 255, 0.6);
        }

        .label-b { color: #dc3545; text-shadow: 0 0 10px rgba(220, 53, 69, 0.3); }
        .bar-b {
            background: linear-gradient(90deg, #dc3545, #ff4b5c);
            box-shadow: 0 0 15px rgba(220, 53, 69, 0.6);
        }

        /* NUMERO DEI VOTI INGRANDITO */
        .count {
            font-family: 'Anton', sans-serif;
            font-size: 38px; /* Aumentato da 24px */
            flex: 0 0 80px;
            text-align: right;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.4);
        }

        /* PULSANTE DI RESET STILIZZATO */
        .btn-reset {
            background-color: #222;
            color: #666;
            border: 1px solid #333;
            padding: 12px 28px;
            font-family: 'Roboto', sans-serif;
            font-weight: bold;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        .btn-reset:hover {
            background-color: #dc3545;
            color: #fff;
            border-color: #dc3545;
            box-shadow: 0 0 15px rgba(220, 53, 69, 0.5);
        }

        /* Responsive di sicurezza per schermi molto piccoli (smartphone vecchi) */
        @media (max-width: 650px) {
            #title { font-size: 44px; white-space: normal; }
            .label { font-size: 24px; flex: 0 0 140px; }
            .count { font-size: 28px; }
            .bar-wrapper { height: 35px; margin: 0 10px; }
            .result-bar-group { padding: 15px; }
        }
    </style>
</head>
<body>

    <div id="container">
        <img src="logo_arsenale.png" alt="Logo Arsenale delle Apparizioni" id="header-logo">
        <h1 id="title">Arsenale delle Apparizioni</h1>
        <h2 id="subtitle">Risultati in tempo reale</h2>

        <div id="results-container">
            <div class="result-bar-group">
                <span class="label label-a">Squadra Blu</span>
                <div class="bar-wrapper">
                    <div id="barA" class="bar bar-a"></div>
                </div>
                <span id="countA" class="count count-a">0</span>
            </div>

            <div class="result-bar-group">
                <span class="label label-b">Squadra Rossa</span>
                <div class="bar-wrapper">
                    <div id="barB" class="bar bar-b"></div>
                </div>
                <span id="countB" class="count count-b">0</span>
            </div>
        </div>

        <button class="btn-reset" onclick="resetVotazione()">Resetta Votazione</button>
    </div>

    <script>
        const SUPABASE_URL = "https://orzpwezibuzpchehvdkw.supabase.co";
        const SUPABASE_KEY = "sb_publishable_uasoAypqJOLzeJAQpfU9qA__5c4SKTK";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const barA = document.getElementById("barA");
        const countA = document.getElementById("countA");
        const barB = document.getElementById("barB");
        const countB = document.getElementById("countB");

        async function caricaEInizializzaDati() {
            try {
                let { data } = await supabaseClient.from('voti_totali').select('*');
                const votoA = data.find(d => d.id === 'opzione_a')?.conteggio || 0;
                const votoB = data.find(d => d.id === 'opzione_b')?.conteggio || 0;
                const totale = votoA + votoB;

                countA.innerText = votoA;
                countB.innerText = votoB;

                const percA = totale > 0 ? (votoA / totale) * 100 : 0;
                const percB = totale > 0 ? (votoB / totale) * 100 : 0;

                barA.style.width = percA + "%";
                barB.style.width = percB + "%";

            } catch (err) {
                console.error("Errore nel caricamento dati:", err);
            }
        }

        async function resetVotazione() {
            if (confirm("Sei sicuro di voler azzerare tutti i voti dello spettacolo corrente?")) {
                try {
                    await supabaseClient.from('voti_totali').update({ conteggio: 0 }).eq('id', 'opzione_a');
                    await supabaseClient.from('voti_totali').update({ conteggio: 0 }).eq('id', 'opzione_b');
                    localStorage.removeItem("haVotato");
                    alert("Votazione azzerata sul palco! 🎭");
                } catch (err) {
                    console.error("Errore durante il reset:", err);
                }
            }
        }

        caricaEInizializzaDati();

        supabaseClient
            .channel('cambiamenti-voti')
            .on('postgres_changes', { event: 'UPDATE', scheme: 'public', table: 'voti_totali' }, () => {
                caricaEInizializzaDati();
            })
            .subscribe();
    </script>
</body>
</html>
