<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risultati in Tempo Reale</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #fff; padding: 20px; }
        .chart-container { width: 80%; max-width: 600px; margin: 30px auto; }
        
        /* Stile per il pulsante di reset */
        .btn-reset {
            background-color: #6b7280;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 20px;
        }
        .btn-reset:hover { background-color: #4b5563; }
    </style>
</head>
<body>

    <h1>Risultati del Voto Live</h1>
    
    <div class="chart-container">
        <canvas id="graficoVoti"></canvas>
    </div>

    <button class="btn-reset" onclick="resetVotazione()">Resetta Votazione</button>

    <script>
        const SUPABASE_URL = "https://orzpwezibuzpchehvdkw.supabase.co";
        const SUPABASE_KEY = "sb_publishable_uasoAypqJOLzeJAQpfU9qA__5c4SKTK";
         // CORRETTO: Uso dell'oggetto globale window.supabase e cambio nome variabile
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Configurazione Chart.js
        const ctx = document.getElementById('graficoVoti').getContext('2d');
        const grafico = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Opzione A', 'Opzione B'],
                datasets: [{
                    label: 'Numero di Voti',
                    data: [0, 0],
                    backgroundColor: ['#3b82f6', '#ef4444'],
                    borderWidth: 1
                }]
            },
            options: {
                scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
            }
        });

        async function caricaEInizializzaDati() {
            let { data } = await supabaseClient.from('voti_totali').select('*');
            const votoA = data.find(d => d.id === 'opzione_a')?.conteggio || 0;
            const votoB = data.find(d => d.id === 'opzione_b')?.conteggio || 0;
            grafico.data.datasets[0].data = [votoA, votoB];
            grafico.update();
        }

        // FUNZIONE DI RESET
        async function resetVotazione() {
            if (confirm("Sei sicuro di voler azzerare tutti i voti?")) {
                // Porta a 0 l'opzione A e l'opzione B su Supabase
                await supabaseClient.from('voti_totali').update({ conteggio: 0 }).eq('id', 'opzione_a');
                await supabaseClient.from('voti_totali').update({ conteggio: 0 }).eq('id', 'opzione_b');
                
                // Consente a te stesso di votare di nuovo se fai un test
                localStorage.removeItem("haVotato");
                
                alert("Votazione azzerata!");
            }
        }

        caricaEInizializzaDati();

        // Realtime
        supabaseClient
            .channel('cambiamenti-voti')
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'voti_totali' }, () => {
                caricaEInizializzaDati();
            })
            .subscribe();
    </script>
</body>
</html>
