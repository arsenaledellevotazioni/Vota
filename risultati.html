<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risultati Live - Arsenale delle Apparizioni</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* FONT TEATRALE E MODERNO */
        @import url('https://fonts.googleapis.com/css2?family=Anton&family=Roboto:wght@400;700&display=swap');

        body {
            font-family: 'Roboto', sans-serif;
            text-align: center;
            background: #111;
            color: #eee;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #container {
            width: 90%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
        }

        /* HEADER CON LOGO */
        #header-logo {
            width: 120px;
            margin-bottom: 20px;
        }

        #title {
            font-family: 'Anton', sans-serif;
            font-size: 32px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            margin-top: 10px;
            margin-bottom: 50px;
        }

        /* CONTENITORE RISULTATI CON BARRE AL NEON */
        #results-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 30px;
            margin-bottom: 50px;
        }

        .result-bar-group {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }

        .label {
            font-family: 'Anton', sans-serif;
            font-size: 20px;
            text-transform: uppercase;
            flex: 0 0 140px;
            text-align: left;
        }

        .bar-wrapper {
            flex: 1;
            height: 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            overflow: hidden;
            margin: 0 20px;
            position: relative;
        }

        .bar {
            height: 100%;
            width: 0%;
            transition: width 0.5s ease-out;
            border-radius: 15px;
        }

        .label-a { color: #007bff; }
        .bar-a {
            background: linear-gradient(90deg, #007bff, #00d4ff);
            box-shadow: 0 0 10px rgba(0, 123, 255, 0.6);
        }

        .label-b { color: #dc3545; }
        .bar-b {
            background: linear-gradient(90deg, #dc3545, #ff4b5c);
            box-shadow: 0 0 10px rgba(220, 53, 69, 0.6);
        }

        .count {
            font-family: 'Anton', sans-serif;
            font-size: 24px;
            flex: 0 0 60px;
            text-align: right;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }

        /* PULSANTE DI RESET STILIZZATO */
        .btn-reset {
            background-color: #222;
            color: #888;
            border: 1px solid #444;
            padding: 12px 24px;
            font-family: 'Roboto', sans-serif;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        .btn-reset:hover {
            background-color: #dc3545; /* Diventa rosso al passaggio */
            color: #fff;
            border-color: #dc3545;
            box-shadow: 0 0 15px rgba(220, 53, 69, 0.5);
        }
    </style>
</head>
<body>

    <div id="container">
        <img src="logo_arsenale.png" alt="Logo Arsenale delle Apparizioni" id="header-logo">
        <h1 id="title">Risultati Live dell'Arsenale delle Apparizioni</h1>

        <div id="results-container">
            <div class="result-bar-group">
                <span class="label label-a">Spettacolo A</span>
                <div class="bar-wrapper">
                    <div id="barA" class="bar bar-a"></div>
                </div>
                <span id="countA" class="count count-a">0</span>
            </div>

            <div class="result-bar-group">
                <span class="label label-b">Spettacolo B</span>
                <div class="bar-wrapper">
                    <div id="barB" class="bar bar-b"></div>
                </div>
                <span id="countB" class="count count-b">0</span>
            </div>
        </div>

        <button class="btn-reset" onclick="resetVotazione()">Resetta Votazione</button>
    </div>

    <script>
        const SUPABASE_URL = "https://orzpwezibuzpchehvdkw.supabase.co";
        const SUPABASE_KEY = "sb_publishable_uasoAypqJOLzeJAQpfU9qA__5c4SKTK";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const barA = document.getElementById("barA");
        const countA = document.getElementById("countA");
        const barB = document.getElementById("barB");
        const countB = document.getElementById("countB");

        async function caricaEInizializzaDati() {
            try {
                let { data } = await supabaseClient.from('voti_totali').select('*');
                const votoA = data.find(d => d.id === 'opzione_a')?.conteggio || 0;
                const votoB = data.find(d => d.id === 'opzione_b')?.conteggio || 0;
                const totale = votoA + votoB;

                countA.innerText = votoA;
                countB.innerText = votoB;

                const percA = totale > 0 ? (votoA / totale) * 100 : 0;
                const percB = totale > 0 ? (votoB / totale) * 100 : 0;

                barA.style.width = percA + "%";
                barB.style.width = percB + "%";

            } catch (err) {
                console.error("Errore nel caricamento dati:", err);
            }
        }

        // FUNZIONE DI RESET
        async function resetVotazione() {
            if (confirm("Sei sicuro di voler azzerare tutti i voti dello spettacolo corrente?")) {
                try {
                    await supabaseClient.from('voti_totali').update({ conteggio: 0 }).eq('id', 'opzione_a');
                    await supabaseClient.from('voti_totali').update({ conteggio: 0 }).eq('id', 'opzione_b');
                    
                    // Sblocca il tuo browser se stavi facendo dei test di voto
                    localStorage.removeItem("haVotato");
                    
                    alert("Votazione azzerata sul palco! 🎭");
                } catch (err) {
                    console.error("Errore durante il reset:", err);
                }
            }
        }

        caricaEInizializzaDati();

        // Realtime
        supabaseClient
            .channel('cambiamenti-voti')
            .on('postgres_changes', { event: 'UPDATE', scheme: 'public', table: 'voti_totali' }, () => {
                caricaEInizializzaDati();
            })
            .subscribe();
    </script>
</body>
</html>
