<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vota l'Opzione</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; padding-top: 50px; margin: 0; }
        .btn-container { display: flex; justify-content: center; gap: 20px; margin-top: 40px; }
        button { padding: 20px 40px; font-size: 20px; cursor: pointer; border: none; border-radius: 8px; color: white; transition: 0.2s; }
        .btn-a { background-color: #3b82f6; } /* Blu */
        .btn-b { background-color: #ef4444; } /* Rosso */
        button:hover { opacity: 0.9; }

        /* OVERLAY DI BLOCCO */
        #overlay {
            display: none; /* Nascosto di default */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.75); /* Sfondo scuro semitrasparente */
            backdrop-filter: blur(4px); /* Effetto sfocato sullo sfondo */
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #messaggio {
            color: #10b981;
            font-size: 28px;
            font-weight: bold;
            background: white;
            padding: 20px 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="voto-box">
        <h1>Quale opzione preferisci?</h1>
        <div class="btn-container">
            <button class="btn-a" onclick="vota('opzione_a')">Blu</button>
            <button class="btn-b" onclick="vota('opzione_b')">Rossi</button>
        </div>
    </div>

    <div id="overlay">
        <div id="messaggio">Grazie! Il tuo voto è stato registrato. ✅</div>
    </div>

    <script>
        // Inizializza Supabase
        const SUPABASE_URL = "https://orzpwezibuzpchehvdkw.supabase.co";
        const SUPABASE_KEY = "sb_publishable_uasoAypqJOLzeJAQpfU9qA__5c4SKTK";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const overlay = document.getElementById("overlay");

        // Funzione per mostrare o nascondere l'overlay a seconda del LocalStorage
        function controllaStatoVoto() {
            if (localStorage.getItem("haVotato") === "true") {
                overlay.style.display = "flex";
            } else {
                overlay.style.display = "none";
            }
        }

        // Avvia il controllo subito al caricamento della pagina
        controllaStatoVoto();

        // CONTROLLO CONTINUO (Ogni 1 secondo): 
        // Se rimuovi l'item dal LocalStorage (es. tramite console o script di reset), l'overlay scompare da solo
        setInterval(controllaStatoVoto, 1000);

        async function vota(opzione) {
            // 1. Salva nel localStorage e mostra istantaneamente l'overlay
            localStorage.setItem("haVotato", "true");
            controllaStatoVoto();

            try {
                // 2. Recupera il conteggio attuale
                let { data, error } = await supabaseClient.from('voti_totali').select('conteggio').eq('id', opzione).single();
                if (error) throw error;
                
                let nuovoConteggio = data.conteggio + 1;

                // 3. Aggiorna il database
                await supabaseClient.from('voti_totali').update({ conteggio: nuovoConteggio }).eq('id', opzione);
            } catch (err) {
                console.error("Errore durante il voto:", err);
                // In caso di errore grave di rete, puoi decidere se sbloccare l'utente togliendo il commento qui sotto:
                // localStorage.removeItem("haVotato");
                // controllaStatoVoto();
            }
        }
    </script>
</body>
</html>
