<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vota l'Opzione</title>
    <!-- Carichiamo la libreria ufficiale di Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; padding-top: 50px; }
        .btn-container { display: flex; justify-content: center; gap: 20px; margin-top: 40px; }
        button { padding: 20px 40px; font-size: 20px; cursor: pointer; border: none; border-radius: 8px; color: white; transition: 0.2s; }
        .btn-a { background-color: #3b82f6; } /* Blu */
        .btn-b { background-color: #ef4444; } /* Rosso */
        button:hover { opacity: 0.9; }
        #messaggio { display: none; font-size: 24px; color: #10b981; font-weight: bold; margin-top: 40px; }
    </style>
</head>
<body>

    <div id="voto-box">
        <h1>Quale opzione preferisci?</h1>
        <div class="btn-container">
            <button class="btn-a" onclick="vota('opzione_a')">Blu</button>
            <button class="btn-b" onclick="vota('opzione_b')">Rossi</button>
        </div>
    </div>

    <div id="messaggio">Grazie! Il tuo voto è stato registrato. ✅</div>

    <script>
        // Inizializza Supabase (Inserisci i tuoi dati qui)
        const SUPABASE_URL = "https://orzpwezibuzpchehvdkw.supabase.co";
        const SUPABASE_KEY = "sb_publishable_uasoAypqJOLzeJAQpfU9qA__5c4SKTK";
        const supabase = @supabase/supabase-js.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Controlla se l'utente ha già votato in passato
        if (localStorage.getItem("haVotato") === "true") {
            mostraConferma();
        }

        async function vota(opzione) {
            // 1. Evita doppi click istantanei
            localStorage.setItem("haVotato", "true");
            mostraConferma();

            // 2. Recupera il conteggio attuale
            let { data } = await supabase.from('voti_totali').select('conteggio').eq('id', opzione).single();
            let nuovoConteggio = data.conteggio + 1;

            // 3. Aggiorna il database (Incrementa di 1)
            await supabase.from('voti_totali').update({ conteggio: nuovoConteggio }).eq('id', opzione);
        }

        function mostraConferma() {
            document.getElementById("voto-box").style.display = "none";
            document.getElementById("messaggio").style.display = "block";
        }
    </script>
</body>
</html>
