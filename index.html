<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vota l'Improvvisazione - Arsenale delle Apparizioni</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* FONT TEATRALE E MODERNO */
        @import url('https://fonts.googleapis.com/css2?family=Anton&family=Roboto:wght@400;700&display=swap');

        body {
            font-family: 'Roboto', sans-serif;
            text-align: center;
            background: #111; /* Sfondo quasi nero come un teatro scuro */
            color: #eee;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #container {
            width: 90%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* HEADER CON LOGO E TESTO CURVO */
        #header-logo {
            width: 150px;
            margin-bottom: 20px;
        }

        #title {
            font-family: 'Anton', sans-serif;
            font-size: 36px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            margin-top: 10px;
            margin-bottom: 40px;
        }

        /* BOTTONI GRANDI E MODERNI */
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            width: 100%;
        }

        button {
            flex: 1;
            padding: 30px;
            font-family: 'Anton', sans-serif;
            font-size: 24px;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            border-radius: 12px;
            color: white;
            transition: transform 0.1s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }

        /* Effetto luce al passaggio del mouse */
        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: all 0.5s;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            transform: translateY(-5px);
        }

        /* Blu Elettrico/Neon */
        .btn-a {
            background-color: #007bff;
            box-shadow: 0 0 15px rgba(0, 123, 255, 0.6);
        }
        .btn-a:hover {
            box-shadow: 0 0 25px rgba(0, 123, 255, 0.8);
        }

        /* Rosso Neon/Passione */
        .btn-b {
            background-color: #dc3545;
            box-shadow: 0 0 15px rgba(220, 53, 69, 0.6);
        }
        .btn-b:hover {
            box-shadow: 0 0 25px rgba(220, 53, 69, 0.8);
        }

        button:active {
            transform: translateY(1px);
        }

        /* OVERLAY DI BLOCCO: AD ANELLO CON LOGO */
        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        /* Immagine del logo nell'overlay */
        #overlay-logo {
            width: 250px; /* Più grande per l'overlay */
            margin-bottom: 20px;
        }

        #messaggio {
            color: #10b981; /* Verde successo */
            font-size: 28px;
            font-weight: bold;
            font-family: 'Roboto', sans-serif;
            text-align: center;
            line-height: 1.4;
        }

        /* Sotto-testo nell'overlay */
        #sub-messaggio {
            color: #aaa;
            font-size: 16px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <img src="logo_arsenale.png" alt="Logo Arsenale delle Apparizioni" id="overlay-logo">
        <div id="messaggio">
            Voto registrato! ✅
        </div>
        <div id="sub-messaggio">Grazie per aver partecipato.</div>
    </div>

    <div id="container">
        <img src="logo_arsenale.png" alt="Logo Arsenale delle Apparizioni" id="header-logo">
        <h1 id="title">Quale squadra ti è piaciuta di più?</h1>

        <div class="btn-container">
            <button class="btn-a" onclick="vota('opzione_a')">Squadra Blu</button>
            <button class="btn-b" onclick="vota('opzione_b')">Squadra Rossa</button>
        </div>
    </div>

    <script>
        // Inizializza Supabase
        const SUPABASE_URL = "https://orzpwezibuzpchehvdkw.supabase.co";
        const SUPABASE_KEY = "sb_publishable_uasoAypqJOLzeJAQpfU9qA__5c4SKTK";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const overlay = document.getElementById("overlay");

        function controllaStatoVoto() {
            if (localStorage.getItem("haVotato") === "true") {
                overlay.style.display = "flex";
            } else {
                overlay.style.display = "none";
            }
        }

        controllaStatoVoto();
        setInterval(controllaStatoVoto, 1000);

        async function vota(opzione) {
            localStorage.setItem("haVotato", "true");
            controllaStatoVoto();

            try {
                let { data, error } = await supabaseClient.from('voti_totali').select('conteggio').eq('id', opzione).single();
                if (error) throw error;
                
                let nuovoConteggio = data.conteggio + 1;
                await supabaseClient.from('voti_totali').update({ conteggio: nuovoConteggio }).eq('id', opzione);
            } catch (err) {
                console.error("Errore durante il voto:", err);
            }
        }
    </script>
</body>
</html>
